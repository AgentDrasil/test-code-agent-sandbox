services:
  gemini-cli-with-docker-sandbox:
    container_name: gemini-cli-with-docker-sandbox
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /home/user
    environment:
      - GEMINI_SANDBOX=docker
      - GEMINI_SANDBOX_IMAGE=ghcr.io/agentdrasil/test-code-agent-sandbox/gemini-cli-sandbox-image:main
    volumes:
      - ~/.gemini:/home/user/.gemini
      # Dedicated volume for DinD — avoids overlay-on-overlay filesystem issues
      - docker-data:/var/lib/docker
    # Required for Docker-in-Docker daemon
    privileged: true

volumes:
  docker-data:
